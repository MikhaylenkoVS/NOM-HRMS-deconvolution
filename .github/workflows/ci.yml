name: CI — pytest + smoke

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov

      - name: Unit tests (fast)
        run: |
          python -m pytest tests/unit/ -q --tb=short --timeout=120

      - name: Smoke tests (if data present)
        if: hashFiles('data/test_sets/set_01/original.csv') != ''
        run: |
          python -m pytest tests/integration/ -q --tb=short --timeout=300
        continue-on-error: true
