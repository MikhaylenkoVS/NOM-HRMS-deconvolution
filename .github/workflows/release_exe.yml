name: Build NOM_HRMS_FGA.exe

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload .exe as workflow artifact"
        type: boolean
        default: true

jobs:
  build-exe:
    name: Build standalone .exe (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0
          # Core deps
          pip install numpy>=1.24 pandas>=2.0 matplotlib>=3.7 nomspectra>=1.0.0 Pillow>=9.0
          # RDKit: try conda name first, then PyPI fallback
          pip install rdkit>=2023.9 2>/dev/null || pip install rdkit-pypi>=2022.9

      - name: Build .exe
        shell: bash
        run: |
          python -m PyInstaller NOM_HRMS_FGA.spec --noconfirm
          ls -lh dist/NOM_HRMS_FGA.exe

      - name: Smoke-test .exe
        shell: bash
        run: |
          echo "Launching NOM_HRMS_FGA.exe for 15 seconds..."
          ./dist/NOM_HRMS_FGA.exe &
          EXE_PID=$!
          sleep 15
          if kill -0 $EXE_PID 2>/dev/null; then
            echo "✓ .exe is running"
            kill $EXE_PID 2>/dev/null || true
          else
            echo "⚠ .exe exited early (may be normal if GUI was closed)"
          fi

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NOM_HRMS_FGA.exe

      - name: Upload as Artifact
        if: inputs.upload_artifact || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: NOM_HRMS_FGA.exe
          path: dist/NOM_HRMS_FGA.exe
          retention-days: 7
